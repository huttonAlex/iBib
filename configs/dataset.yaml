# YOLOv8 Dataset Configuration for PointCam Bib Detection

path: ./data  # Dataset root directory (relative to project root)
train: images/train
val: images/val

# Labels are automatically found in labels/train and labels/val
# (YOLOv8 replaces 'images' with 'labels' in the path)

# Class names
names:
  0: bib
